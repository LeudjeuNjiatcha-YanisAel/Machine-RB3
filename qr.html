<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MACHINE VB3 | QR Connecte</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

:root{
--primary:#5865F2;
--secondary:#00d4ff;
--bg:#050507;
--card:rgba(255,255,255,0.05);
--text:#ffffff;
--text-dim:#9ca3af;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;

background-image:
radial-gradient(circle at 20% 30%,rgba(88,101,242,0.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,212,255,0.12),transparent 40%);
}

.container{
max-width:900px;
width:100%;
background:var(--card);
border:1px solid rgba(255,255,255,0.08);
border-radius:25px;
backdrop-filter:blur(15px);
padding:50px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.logo{
font-size:55px;
margin-bottom:15px;
}

h1{
font-size:40px;
font-weight:700;
background:linear-gradient(45deg,var(--primary),var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
color:var(--text-dim);
font-size:18px;
margin-bottom:30px;
}

#qrBox{
margin-top:20px;
display:flex;
justify-content:center;
}

canvas{
background:white;
padding:10px;
border-radius:10px;
}

.console{
margin-top:35px;
background:#000;
border-radius:10px;
padding:15px;
text-align:left;
height:200px;
overflow-y:auto;
font-size:13px;
border:1px solid rgba(255,255,255,0.1);
}

.log{
color:#9effff;
margin-bottom:4px;
font-family:monospace;
}

</style>
</head>

<body>

<div class="container">

<a href="/" style="
position:absolute;
left:20px;
top:20px;
font-weight:500;
font-size:20px;
text-decoration:none;
color:rgb(16,152,93);
">
⬅ Retour
</a>

<div class="logo">📷</div>

<h1>QR WhatsApp</h1>

<p class="subtitle">
Scannez ce QR Code avec WhatsApp
</p>

<div id="qrBox"></div>

<div class="console" id="console"></div>

</div>

<script>

function log(msg){

const consoleBox = document.getElementById("console")

const div = document.createElement("div")
div.className = "log"
div.innerText = msg

consoleBox.appendChild(div)

consoleBox.scrollTop = consoleBox.scrollHeight

}

async function loadQR(){

const res = await fetch("/qr-verif")
const data = await res.json()

if(!data.qr) return

document.getElementById("qrBox").innerHTML=""

QRcode = data.qr

QRCode.toCanvas(QRcode,{width:250},function(err,canvas){

document.getElementById("qrBox").appendChild(canvas)

})

log("📱 QR Code chargé")

}

setInterval(loadQR,4000)

loadQR()

</script>

</body>
</html>
