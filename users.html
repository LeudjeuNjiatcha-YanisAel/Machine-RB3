<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MACHINE VB3 | Users</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

    :root{
        --primary:#5865F2;
        --secondary:#00d4ff;
        --danger:#ef0f17;
        --bg:#050507;
        --card:rgba(255,255,255,0.05);
        --text:#ffffff;
        --text-dim:#9ca3af;
    }
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Outfit',sans-serif;
    }
    body{
        background:var(--bg);
        color:var(--text);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
        background-image:
        radial-gradient(circle at 20% 30%,rgba(88,101,240,0.15),transparent 40%),
        radial-gradient(circle at 80% 70%,rgba(0,212,255,0.15),transparent 40%);
    }
    .userContainer{
        max-width:900px;
        width:100%;
        background:var(--card);
        border:1px solid rgba(255,255,255,0.08);
        border-radius:25px;
        backdrop-filter:blur(15px);
        padding:50px;
        text-align:center;
        box-shadow:0 10px 40px rgba(0,0,0,0.5);
        animation:fade 0.8s ease;
        position:relative;
    }

    @keyframes fade{
        from{opacity:0;transform:translateY(30px);}
        to{opacity:1;transform:translateY(0);}
    }
    .logo{
        font-size:55px;
        margin-bottom:15px;
    }
    h1{
        font-size:42px;
        font-weight:700;
        background:linear-gradient(45deg,var(--primary),var(--secondary));
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        margin-bottom:10px;
    }
    .title{
        color:var(--text-dim);
        font-size:18px;
        margin-bottom:40px;
    }
    .userCard{
        background:rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.08);
        border-radius:15px;
        padding:20px;
        margin-bottom:20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        transition:0.3s;
    }
    .userCard:hover{
        border-color:var(--secondary);
        box-shadow:0 10px 30px rgba(0,212,255,0.15);
        transform:translateY(-4px) scale(1.02);
    }
    .userInfo{
        text-align:left;
    }
    .userInfo h3{
        font-size:18px;
        margin-bottom:5px;
    }
    .userInfo span{
        color:var(--secondary);
        font-size:15px;
    }

    .disconnect{
        background:linear-gradient(45deg,var(--danger),#ff5c5c);
        padding:10px 18px;
        border-radius:10px;
        cursor:pointer;
        border:none;
        color:white;
        font-weight:600;
        transition:0.2s;
    }
    .disconnect:hover{
        transform:scale(1.05);
    }

    .footer{
        margin-top:30px;
        font-size:13px;
        color:var(--text-dim);
    }
    /* message de confirmation */
    .confirmOverlay{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.7);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:999;
    }
    .confirmModal{
        background:rgba(20,20,25,0.95);
        padding:30px;
        border-radius:15px;
        text-align:center;
        width:320px;
        border:1px solid rgba(255,255,255,0.08);
        box-shadow:0 0 25px rgba(0,0,0,0.6);
        animation:fade 0.3s ease;
    }
    .confirmModal h2{
        margin-bottom:15px;
    }
    .confirmButtons{
        margin-top:20px;
        display:flex;
        justify-content:space-around;
    }
    .yesBtn{
        background:#1bd96a;
        border:none;
        padding:10px 20px;
        border-radius:8px;
        color:white;
        cursor:pointer;
        font-weight:600;
    }
    .noBtn{
        background:#ff3b3b;
        border:none;
        padding:10px 20px;
        border-radius:8px;
        color:white;
        cursor:pointer;
        font-weight:600;
    }
    .yesBtn:hover{
        transform:scale(1.05);
        box-shadow:0 5px 10px rgba(27, 217, 106, 0.833);
    }
    .noBtn:hover{
        transform:scale(1.05);
        box-shadow: 0 5px 10px rgba(255, 59, 59, 0.835);
    }
</style>
</head>

<body>

<div class="userContainer">
    <a href="/admin" style="
    position:absolute;
    left:20px;
    top:20px;
    font-size:18px;
    text-decoration:none;
    color:#1bd96a;
    ">
    ⬅ Retour
    </a>
    <div class="logo">🤖</div>

    <h1>MACHINE VB3<br>USERS</h1>

    <p class="title">
        Gérez les utilisateurs connectés à votre bot WhatsApp en toute simplicite.
    </p>

    <div id="usersContainer"></div>

    <div class="footer">
        MACHINE VB3 • User Interface
    </div>

</div>

<script>

async function loadUsers(){

    const res = await fetch("/status")
    const data = await res.json()

    const container = document.getElementById("usersContainer")

    container.innerHTML = ""

    const maxUsers = 3

    for(let i=0;i<maxUsers;i++){
        let user = data.list[i]
        if(user){
            container.innerHTML += `
            <div class="userCard">

            <div class="userInfo">
            <h3>Utilisateur ${i+1}</h3>
            <div>Numéro : ${user.number}</div>
            <span>Prefix : ${user.prefix}</span>
            </div>

            <button class="disconnect" onclick="askDisconnect('${user.number}')">
            Deconnecter
            </button>

            </div>
            `

        }
        else{
            container.innerHTML += `
            <div class="userCard">

            <div class="userInfo">
            <h3>Utilisateur ${i+1}</h3>
            <div>Aucun utilisateur connecté</div>
            </div>

            </div>
            `
        }
    }
}

async function disconnectUser(number){

    const res = await fetch("/disconnect",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({number})
    })

    const data = await res.json()

    if(data.success){
        alert("Utilisateur déconnecté")
        loadUsers()
    }
    else{
        alert(data.message)
    }

}

// Message d confirmation 
let selectedNumber = null
function askDisconnect(number){
    selectedNumber = number

    document.getElementById("confirmText").innerText =
    "Voulez-vous vraiment déconnecter " + number + " ?"

    document.getElementById("confirmBox").style.display = "flex"
}

function closeConfirm(){
    document.getElementById("confirmBox").style.display = "none"
    selectedNumber = null
}

async function confirmDisconnect(){
    if(!selectedNumber) return

    const res = await fetch("/disconnect",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({number:selectedNumber})
    })

    const data = await res.json()

    closeConfirm()

    if(data.success){
        alert("Utilisateur déconnecté")
        loadUsers()
    }else{
        alert(data.message)
    }

}

loadUsers()
setInterval(loadUsers,5000)

</script>

<div id="confirmBox" style="display:none;" class="confirmOverlay">
    <div class="confirmModal">
        <h2>Confirmer la déconnexion ?</h2>
        <p id="confirmText"></p>
        <div class="confirmButtons">
        <button class="yesBtn" onclick="confirmDisconnect()">Oui</button>
        <button class="noBtn" onclick="closeConfirm()">Non</button>
        </div>
    </div>
</div>

</body>
</html>
