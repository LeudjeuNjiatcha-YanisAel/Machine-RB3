<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MACHINE VB3 | Pair Bot</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#5865F2;
--secondary:#00d4ff;
--secon:#ef0f17;
--bg:#050507;
--card:rgba(255,255,255,0.05);
--text:#ffffff;
--text-dim:#9ca3af;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;

background-image:
radial-gradient(circle at 20% 30%,rgba(88,101,242,0.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,212,255,0.12),transparent 40%);
}

.container{
max-width:900px;
width:100%;
background:var(--card);
border:1px solid rgba(255,255,255,0.08);
border-radius:25px;
backdrop-filter:blur(15px);
padding:50px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.logo{
font-size:55px;
margin-bottom:15px;
}

h1{
font-size:40px;
font-weight:700;
background:linear-gradient(45deg,var(--primary),var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
color:var(--text-dim);
font-size:18px;
margin-bottom:30px;
}

/* input */

input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
margin-bottom:20px;
font-size:16px;
text-align:center;
}

input::placeholder{
color:#aaa;
}

/* buttons */

.buttons{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:25px;
}

.btn{
padding:14px 28px;
border-radius:12px;
font-weight:600;
font-size:15px;
border:none;
cursor:pointer;
color:white;
transition:0.25s;
}

.connect{
background:linear-gradient(45deg,var(--primary),var(--secondary));
box-shadow:0 5px 20px rgba(88,101,242,0.4);
}

.disconnect{
background:linear-gradient(45deg,var(--primary),var(--secon));
box-shadow:0 5px 20px rgba(253, 30, 30, 0.4);
}

.btn:hover{
transform:translateY(-3px);
filter:brightness(1.1);
}

/* pairing code */

.codeBox{
margin-top:15px;
font-size:22px;
letter-spacing:3px;
font-weight:600;
color:var(--secondary);
}

/* console */

.console{
margin-top:35px;
background:#000;
border-radius:10px;
padding:15px;
text-align:left;
height:220px;
overflow-y:auto;
font-size:13px;
border:1px solid rgba(255,255,255,0.1);
}

.log{
color:#9effff;
margin-bottom:4px;
font-family:monospace;
}

/* footer */

.footer{
margin-top:30px;
font-size:13px;
color:var(--text-dim);
}

</style>
</head>

<body>

<div class="container">
<a href="/" style="
position:absolute;
left:20px;
top:20px;
font-weight: 500;
font-size:20px;
text-decoration:none;
color:rgb(16, 152, 93);
">
⬅ Retour Au Menu
</a>

<div style="margin-top:20px;position:absolute;left:80%;">
<span id="botStatus" style="font-weight:900;color:#ff3b3b;font-size:20px">
● Bot hors ligne
</span>
</div>

<div class="logo">📱</div>

<h1>Code WhatsApp</h1>

<p class="subtitle">
Connectez votre numéro WhatsApp avec un code de liaison
</p>

<input id="number" placeholder="Entrer numero (ex: 2376xxxxxxxx)">

<div class="buttons">

<button class="btn connect" onclick="connectBot()">
Connecter
</button>

<button class="btn disconnect" onclick="disconnectBot()">
Deconnecter
</button>

</div>

<div class="codeBox" id="pairCode"></div>

<div class="console" id="console"></div>

<div class="footer">
MACHINE VB3 • Pair Interface
</div>

</div>

<script>

async function checkBot(){

const res = await fetch("/status")
const data = await res.json()

const status = document.getElementById("botStatus")

if(data.connected){

status.innerText="● Bot connecté"
status.style.color="#00ff88"
status.style.fontWeight="900"

}else{

status.innerText="● Bot hors ligne"
status.style.color="#ff3b3b"
status.style.fontWeight="900"

}

}


function log(msg){

const consoleBox = document.getElementById("console")

const div = document.createElement("div")
div.className = "log"
div.innerText = msg

consoleBox.appendChild(div)

consoleBox.scrollTop = consoleBox.scrollHeight

}

/* CONNECT */

async function connectBot(){

let number = document.getElementById("number").value
number = number.replace(/[^0-9]/g,"")

if(!number){
log("❌ Enter phone number")
return
}

log("⏳ Connecting...")

const res = await fetch("/connect",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({number})
})

const data = await res.json()

if(data.code){

document.getElementById("pairCode").innerText = data.code

log("✅ Pair code generated")

}else{

log("❌ Error connecting")

}

}

/* DISCONNECT */

async function disconnectBot(){

await fetch("/disconnect",{method:"POST"})

document.getElementById("pairCode").innerText=""

log("⚠ Bot disconnected")

}

/* STATUS */

async function checkStatus(){

const res = await fetch("/status")
const data = await res.json()

if(data.connected){

log("✅ Bot connected")

}

}

/* LIVE LOGS */

let lastLog = 0

async function getLogs(){

const res = await fetch("/logs")
const data = await res.json()

for(let i = lastLog; i < data.length; i++){

const l = data[i]

log("["+l.time+"] "+l.msg)

}

lastLog = data.length

}

setInterval(checkStatus,5000)
setInterval(getLogs,4000)
checkStatus()
getLogs()

</script>

</body>
</html>
