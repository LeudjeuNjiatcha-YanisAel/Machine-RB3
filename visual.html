<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MACHINE VB3 | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary:#5865F2;
            --secondary:#00d4ff;
            --bg:#050507;
            --card:rgba(255,255,255,0.05);
            --text:#ffffff;
            --text-dim:#9ca3af;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Outfit',sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
            background-image:
            radial-gradient(circle at 20% 30%,rgba(88,101,242,0.15),transparent 40%),
            radial-gradient(circle at 80% 70%,rgba(0,212,255,0.12),transparent 40%);
        }

        .cls{
            max-width:600px;
            width:100%;
            background:var(--card);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:25px;
            backdrop-filter:blur(35px);
            padding:40px;
            text-align:center;
            box-shadow:0 10px 40px rgba(0,0,0,0.5);
            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{opacity:0;transform:translateY(30px);}
            to{opacity:1;transform:translate(0);}
        }
        .cls .logo{
            font-size:55px;
            margin-bottom:20px;
        }

        .cls h1{
            font-size:28px;
            font-weight:600;
            background:linear-gradient(90deg,var(--primary),var(--secondary));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            margin-bottom:10px;

        }

        .cls p{
            color:var(--text-dim);
            font-size:16px;
            color:var(--text-dim);
        }
        
        .features{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:30px;
        }

        .feature{
            background:rgba(255,255,255,0.04);
            padding:20px;
            border-radius:15px;
            border:1px solid rgba(255,255,255,0.08);
            transition:0.3s;
            cursor:pointer;
            margin-bottom: 20px;
        }

        .feature:hover{
            border-color:var(--secondary);
            transform:translateY(-6px) scale(1.02);
            box-shadow:0 10px 30px rgba(0,212,255,0.15);
        }

        .feature span{
            font-size:30px;
            margin-bottom:10px;
        }

        .feature .icon{
            font-size:30px;
            margin-bottom:15px;
        }

        .feature h3{
            font-size:20px;
            margin-bottom:10px;
        }

        .footer{
            margin-top:40px;
            font-size:13px;
            color:var(--text-dim);
        }

    </style>

</head>
<body>
    <div class="cls"> 
        <div style="margin-top:20px;left:70%;position:absolute">
        <span id="botStatus" style="font-weight:900;color:#ff3b3b;font-size:20px">
        ● Bot hors ligne
        </span>
        </div>
        <a href="/admin" style="
        position:relative;
        float:left;
        font-size:18px;
        text-decoration:none;
        color:#1bd96a;
        ">
        ⬅ Retour
        </a>
        <div class="logo">🤖</div>
        <h1>MACHINE VB3<br>ANALYSE</h1>
        <p class="title">
        Consulter en live les logs d'utilisation du bot de chaque utilisateur.
        </p>
        <div class="features">
            <div class="feature">
                <span class="icon">⚙️</span>
                <h3>Gestion complète</h3>
                <p>Gestion des logs et message que le bot traite</p>
            </div>
        </div>
        <h1> Logs d'utilisation du bot </h1>
        <div id="console" style="background: #000;
            padding:15px;
            height:200px;
            overflow-y:auto;
            border-radius:10px;
            margin-top:10px;
            font-size:13px;
            font-family:monospace;">
        </div>
        <div class="footer">
        MACHINE VB3 • Analyse Interface
        </div>
    </div>
    <script>
        async function checkBot() {
            const res = await fetch("/status")
            const data = await res.json()
            const status = document.getElementById("botStatus")

            if(data.connected){
                status.innerText="● Bot connecté"
                status.style.fontWeight="900"
                status.style.color="#00ff88"
            }
            else{
                status.innerText="● Bot hors ligne"
                status.style.color="#ff3b3b"
            }

        }
        setInterval(checkBot,1000)

        async function Logs(){
            const res = await fetch("/log")
            const logs = await res.json()

            const box = document.getElementById("console")
            consoleBox.innerHTML=""

            logs.forEach(l=>{
                const line = document.createElement("div")
                line.innerTet = "["+l.time+"] "+l.msg

                consoleBox.appendChild(line)
            })

            consoleBox.scrollTop = consoleBox.scrollHeight
        } 
        setInterval(Logs,2000)
    </script>
</body>
</html>
